info:
  name: 04 Get Order
  type: http
  seq: 6

http:
  method: GET
  url: "{{baseUrl}}/orders/{{orderId}}"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        // Test: status 200
        expect(res.status).to.equal(200);

        // Test: orderId ตรงกัน
        expect(res.body.orderId).to.equal(bru.getEnvVar("orderId"));

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
